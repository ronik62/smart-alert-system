server.port=${PORT:8080}
spring.application.name=smart-alert-system

# H2 Database (in-memory for dev — replace with MySQL/Postgres in prod)
spring.datasource.url=jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Alert System Configuration
# ============================================================

# Delay window (seconds) before an alert triggers a ticket.
# Alerts that resolve within this window are considered false positives.
alert.delay.sev1=60
alert.delay.sev2=120
alert.delay.sev3=300
alert.delay.sev4=600

# Scheduler interval: how often the pending-alert processor runs (ms)
alert.scheduler.interval-ms=15000

# CORS (allow React dev server)
cors.allowed-origins=http://localhost:3000,http://localhost:5173
